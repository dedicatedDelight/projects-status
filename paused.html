<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="robots" content="noindex,nofollow"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Paused — HoneyDo status</title><style>
:root{color-scheme:light;--ink:#242624;--muted:#606760;--line:#d9ddd8;--paper:#fff;
--bg:#f7f8f5;--green:#276448;--blue:#315f91;--amber:#845b08;--red:#8b2e2e}
*{box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
max-width:820px;margin:auto;padding:24px 16px 64px;color:var(--ink);background:var(--bg);line-height:1.5}
h1{font-size:1.55rem;margin:0 0 4px}.sub{color:var(--muted);font-size:.9rem;margin-bottom:22px}
nav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px;border-bottom:1px solid var(--line);padding-bottom:10px}
nav a{color:#3e4540;text-decoration:none;padding:8px 10px;border-radius:6px;font-size:.9rem}
nav a:hover{background:#e9ece7}nav a.active{background:#dce8df;color:#193e2c;font-weight:700}
h2.section{font-size:1.05rem;margin:26px 0 10px}.card{background:var(--paper);border:1px solid var(--line);
border-radius:10px;padding:16px 18px;margin:10px 0}.card h2,.card h3{font-size:1rem;margin:0 0 6px}
.meta{font-size:.84rem;color:var(--muted);margin:3px 0}.badge{display:inline-block;font-size:.72rem;
font-weight:650;padding:2px 8px;border-radius:99px;background:#e7ebe7;color:#3c443e;margin-left:5px}
.badge.status{background:#dce8ef;color:#244d66}.badge.priority-urgent{background:#f6dddd;color:#7e2525}
.badge.priority-high{background:#faead1;color:#744d08}.badge.priority-normal{background:#e1ebe5;color:#27543b}
.badge.priority-low,.badge.priority-unrated{background:#eceeeb;color:#515851}
.blocker{background:#fff7e8;border:1px solid #ead7ad;border-radius:8px;padding:8px 11px;font-size:.84rem;margin-top:10px}
details{margin-top:8px}summary{cursor:pointer;border-radius:7px;padding:7px 8px;font-weight:600}
summary:hover{background:#eef1ed}summary:focus-visible,a:focus-visible{outline:3px solid #286fa8;outline-offset:2px}
.project-toggle>summary{list-style:none}.project-toggle>summary::-webkit-details-marker{display:none}
.project-toggle>.card{margin:6px 0 14px}.progress-label{font-size:.85rem;display:flex;justify-content:space-between;gap:10px}
.progress-track{display:block;height:11px;background:#dde1dc;border-radius:8px;overflow:hidden;margin-top:5px}
.progress-fill{height:100%;display:block;background:var(--green)}.paused .progress-fill{background:#858c86}
.step{border-top:1px solid #eceeeb;padding:9px 0;font-size:.88rem}.step:first-child{margin-top:8px}
.empty{color:var(--muted);font-style:italic;padding:16px 0}.archive{margin-top:28px;border-top:1px solid var(--line);padding-top:14px}
footer{margin-top:42px;font-size:.76rem;color:var(--muted)}
@media(max-width:520px){body{padding-top:16px}.progress-label{display:block}.progress-label span{display:block}}
</style></head><body>
<h1>Paused</h1><div class="sub">Projects set aside, with a clear route back.</div><nav aria-label="Project views"><a href="index.html">Active Projects</a><a href="not-started.html">Not Started</a><a href="paused.html" class="active">Paused</a><a href="completed.html">Completed</a></nav>
<main><div class="empty">No paused projects.</div><details class="archive"><summary>Abandoned archive (0)</summary><div class="empty">No abandoned projects.</div></details></main><footer>Generated from the household project tracker — not indexed, link-only.</footer></body></html>
